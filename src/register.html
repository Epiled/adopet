<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro - Adopet</title>

    <meta
      name="description"
      content="Crie sua conta gratuita no Adopet hoje mesmo. Junte-se à nossa rede de proteção animal e dê o primeiro passo para levar um novo pet para casa."
    />

    <link
      rel="icon"
      href="./assets/favicon/favicon-blue.svg"
      type="image/svg+xml"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@500&family=Poppins:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/global/style.css" />
  </head>

  <body class="container" data-layout="default">
    <header class="menu">
      <nav class="menu__navigation">
        <img
          class="menu__logo"
          src="./assets/svg/logos/logo.svg"
          alt="Logo - Adopet"
          width="128"
          height="31"
        />
        <ul class="menu__list">
          <li class="menu__item menu__item--house">
            <a
              class="menu__link"
              href="./index.html"
              aria-label="Página Inicial"
            ></a>
          </li>
          <li class="menu__item menu__item--email">
            <a
              class="menu__link"
              href="./contact.html"
              aria-label="Entrar em contato via e-mail"
            ></a>
          </li>
        </ul>
      </nav>
    </header>

    <main class="container__main">
      <section class="container__content register__content">
        <img
          class="logo"
          src="./assets/svg/logos/logo-blue.svg"
          alt="Adopet"
          width="260"
          height="64"
        />

        <div class="register__texts">
          <p class="text">Ainda não tem register?</p>
          <p class="text">
            Então, antes de buscar seu melhor amigo, precisamos de alguns dados:
          </p>
        </div>

        <form id="register-form" class="form" action="login.html">
          <label class="form__label" for="email"
            >Email
            <input
              id="email"
              class="form__input"
              type="text"
              placeholder="Escolha seu melhor email"
            />
          </label>
          <label class="form__label" for="name"
            >Nome
            <input
              id="name"
              class="form__input"
              type="text"
              placeholder="Digite seu nome completo"
            />
          </label>
          <label class="form__label" for="password"
            >Senha
            <input
              id="password"
              class="form__input form__password"
              type="text"
              placeholder="Crie uma senha"
            />
          </label>
          <label class="form__label" for="confim-password"
            >Confirma sua senha
            <input
              id="confim-password"
              class="form__input form__password"
              type="text"
              placeholder="Repita a senha criada acima"
            />
          </label>
        </form>

        <button class="button" type="submit" form="register-form">
          Cadastrar
        </button>
      </section>
    </main>

    <footer class="footer">
      <p class="footer__text">2022 - Desenvolvido por Alura.</p>
    </footer>
  </body>
</html>
