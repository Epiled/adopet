<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Adopet</title>

    <meta
      name="description"
      content="Descubra o Adopet, a plataforma que conecta você ao seu novo melhor amigo. Encontre cães e gatos resgatados prontos para adoção e transforme uma vida."
    />

    <link
      rel="icon"
      href="./assets/favicon/favicon-blue.svg"
      type="image/svg+xml"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@500&family=Poppins:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/global/style.css" />
  </head>

  <body class="container" data-layout="brand">
    <header class="menu">
      <nav class="menu__navigation">
        <img
          class="menu__logo"
          src="./assets/svg/logos/logo.svg"
          alt="Logo - Adopet"
          width="128"
          height="31"
        />
        <ul class="menu__list">
          <li class="menu__item menu__item--house">
            <a
              class="menu__link"
              href="./index.html"
              aria-label="Página Inicial"
            ></a>
          </li>
          <li class="menu__item menu__item--email">
            <a
              class="menu__link"
              href="./contact.html"
              aria-label="Entrar em contato via e-mail"
            ></a>
          </li>
        </ul>
      </nav>
    </header>

    <main class="container__main">
      <section class="container__content initial__content">
        <img
          class="logo logo--alter"
          src="./assets/svg/logos/logo.svg"
          alt="Adopet"
          width="260"
          height="64"
        />

        <div class="initial__texts">
          <h1 class="initial__title">Boas-vindas!</h1>

          <p class="text text--alter">
            Que tal mudar sua vida adotando seu novo melhor amigo? Vem com a
            gente!
          </p>
        </div>

        <div class="initial__buttons">
          <a class="button button--banner" href="./login.html"
            >Já tenho conta</a
          >
          <a class="button button--banner" href="./register.html"
            >Quero me cadastrar</a
          >
        </div>
      </section>
    </main>

    <footer class="footer">
      <p class="footer__text">2022 - Desenvolvido por Alura.</p>
    </footer>
  </body>
</html>
