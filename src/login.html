<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Adopet</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@500&family=Poppins:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./assets/css/style.css" />
  </head>

  <body class="login">
    <header class="menu">
      <nav class="menu__navigation">
        <img
          class="menu__logo"
          src="./assets/img/header/Logo.svg"
          alt="Logo - Adopet"
          width="128"
          height="31"
        />
        <ul class="menu__list">
          <li class="menu__item menu__item-casa">
            <a
              class="menu_link"
              href="./index.html"
              aria-label="Página Inicial"
            ></a>
          </li>
          <li class="menu__item menu__item--email">
            <a
              class="menu_link"
              href="#"
              aria-label="Entrar em contato via e-mail"
            ></a>
          </li>
        </ul>
      </nav>
    </header>
    <main class="login__container">
      <section class="login__content">
        <img
          class="login__logo"
          src="./assets/img/conteiner/Logo_-_azul.png"
          alt="Adopet"
          width="260"
          height="64"
        />

        <p class="login__text">Já tem conta? Faça seu login:</p>

        <form class="form" action="home.html">
          <label class="form__label" for=""
            >Email
            <input
              class="form__input form__email"
              type="text"
              placeholder="Escolha seu melhor email"
            />
          </label>
          <label class="form__label" for=""
            >Senha
            <input
              class="form__input form__password"
              type="text"
              placeholder="Crie uma senha"
            />
          </label>

          <a class="form__link" href="#">Esqueci minha senha.</a>

          <button class="button" type="submit">Entrar</button>
        </form>
      </section>
    </main>

    <footer class="footer">
      <p class="footer__text">2022 - Desenvolvido por Alura.</p>
    </footer>
  </body>
</html>
