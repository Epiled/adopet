<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Adopet</title>

    <meta
      name="description"
      content="Acesse sua conta no Adopet para acompanhar seus processos de adoção, favoritar pets e conversar diretamente com ONGs e protetores de animais."
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@500&family=Poppins:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/global/style.css" />
  </head>

  <body class="container" data-layout="default">
    <header class="menu">
      <nav class="menu__navigation">
        <img
          class="menu__logo"
          src="./assets/svg/logos/logo.svg"
          alt="Logo - Adopet"
          width="128"
          height="31"
        />
        <ul class="menu__list">
          <li class="menu__item menu__item--house">
            <a
              class="menu__link"
              href="./index.html"
              aria-label="Página Inicial"
            ></a>
          </li>
          <li class="menu__item menu__item--email">
            <a
              class="menu__link"
              href="./contact.html"
              aria-label="Entrar em contato via e-mail"
            ></a>
          </li>
        </ul>
      </nav>
    </header>

    <main class="container__main">
      <section class="container__content login__content">
        <img
          class="logo"
          src="./assets/svg/logos/logo-blue.svg"
          alt="Adopet"
          width="260"
          height="64"
        />

        <p class="text">Já tem conta? Faça seu login:</p>

        <form id="login-form" class="form" action="home.html">
          <label class="form__label" for=""
            >Email
            <input
              class="form__input form__email"
              type="text"
              placeholder="Insira seu email"
            />
          </label>

          <div class="form__box">
            <label class="form__label" for=""
              >Senha
              <input
                class="form__input form__password"
                type="text"
                placeholder="Insira sua senha"
              />
            </label>

            <a class="form__link" href="#">Esqueci minha senha.</a>
          </div>
        </form>

        <button class="button" type="submit" form="login-form">Entrar</button>
      </section>
    </main>

    <footer class="footer">
      <p class="footer__text">2022 - Desenvolvido por Alura.</p>
    </footer>
  </body>
</html>
