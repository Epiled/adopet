<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home - Adopet</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@500&family=Poppins:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/global/style.css" />
  </head>

  <body class="container home">
    <header class="menu">
      <nav class="menu__navigation">
        <img
          class="menu__logo"
          src="./assets/svg/logos/logo.svg"
          alt="Logo - Adopet"
          width="128"
          height="31"
        />
        <ul class="menu__list">
          <li class="menu__item menu__item--house">
            <a
              class="menu__link"
              href="./index.html"
              aria-label="Página Inicial"
            ></a>
          </li>
          <li class="menu__item menu__item--email">
            <a
              class="menu__link"
              href="#"
              aria-label="Entrar em contato via e-mail"
            ></a>
          </li>
          <li class="menu__item menu__item--profile">
            <a
              class="menu__link"
              href="#"
              aria-label="Entrar em contato via e-mail"
              aria-labelledby="Seu Perfil"
            ></a>
          </li>
        </ul>
      </nav>
    </header>
    <main class="home__container">
      <section class="home__content">
        <p class="home__text">Olá! Veja os amigos disponíveis para adoção!</p>

        <ul class="pets" data-list-pets>
          <li class="pets__item">
            <img
              class="pets__image"
              src="./assets/img/pets/animais-dunga.png"
              width="650"
              height="650"
              alt="Cachorro"
            />
            <div class="pets__data">
              <div>
                <h2 class="pets__name">Dunga</h2>
                <ul class="pets__infos">
                  <li>2 anos</li>
                  <li>Porte pequeno</li>
                  <li>Calmo e educado</li>
                </ul>
              </div>
              <div>
                <p class="pets__address">Rio de Janeiro (RJ)</p>
                <a class="pets__responsible" href="#">Falar com responsável</a>
              </div>
            </div>
          </li>
        </ul>
      </section>
    </main>

    <footer class="footer">
      <p class="footer__text">2022 - Desenvolvido por Alura.</p>
    </footer>

    <script type="module" src="./js/list.js"></script>
  </body>
</html>
