<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Perfil - Adopet</title>

    <meta
      name="description"
      content="Gerencie suas informações pessoais, atualize sua foto e acompanhe seu histórico e preferências de adoção dentro da comunidade Adopet."
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@500&family=Poppins:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/global/style.css" />
  </head>

  <body class="container profile" data-layout="default-tablet">
    <header class="menu">
      <nav class="menu__navigation">
        <img
          class="menu__logo"
          src="./assets/svg/logos/logo.svg"
          alt="Logo - Adopet"
          width="128"
          height="31"
        />
        <ul class="menu__list">
          <li class="menu__item menu__item--house">
            <a
              class="menu__link"
              href="./index.html"
              aria-label="Página Inicial"
            ></a>
          </li>
          <li class="menu__item menu__item--email">
            <a
              class="menu__link"
              href="./contact.html"
              aria-label="Entrar em contato via e-mail"
            ></a>
          </li>
          <li class="menu__item menu__item--profile">
            <a
              class="menu__link"
              href="./profile.html"
              aria-label="Entrar em seu Perfil"
            ></a>
          </li>
        </ul>
      </nav>
    </header>

    <main class="container__main">
      <section class="container__content" data-layout="default-tablet">
        <p class="text">
          Esse é o perfil que aparece para responsáveis ou ONGs que recebem sua
          mensagem.
        </p>

        <form class="form form--alter" action="./home.html">
          <div class="form__fields">
            <h2 class="form__title">Perfil</h2>

            <label class="form__label form__label--brand" for="photo"
              >Foto
              <div class="form__box form__box--alter">
                <img
                  class="form__photo"
                  src="./assets/svg/icons-ui/user.svg"
                  alt=""
                />
                <button class="form__link form__link--alter">
                  Clique na foto para editar
                </button>
              </div>
              <input
                id="photo"
                class="form__input form__input--alter hidden"
                type="file"
                placeholder="Envie sua foto"
                alt="Envie uma imagem aqui"
              />
            </label>
            <label class="form__label form__label--brand" for="name"
              >Nome
              <input
                id="name"
                class="form__input form__input--alter"
                type="text"
                placeholder="Insira seu nome completo"
              />
            </label>
            <label class="form__label form__label--brand" for="phone"
              >Telefone
              <input
                id="phone"
                class="form__input form__input--alter"
                type="text"
                placeholder="Insira seu telefone e/ou whatsapp"
              />
            </label>
            <label class="form__label form__label--brand" for="city"
              >Cidade
              <input
                id="city"
                class="form__input form__input--alter"
                type="text"
                placeholder="Insira sua cidade"
              />
            </label>
            <label class="form__label form__label--brand" for="about"
              >Sobre
              <input
                id="about"
                class="form__input form__input--alter"
                type="text"
                placeholder="Escreva um pouco sobre você."
              />
            </label>
          </div>
          <button class="button" type="submit">Salvar</button>
        </form>
      </section>
    </main>

    <footer class="footer">
      <p class="footer__text">2022 - Desenvolvido por Alura.</p>
    </footer>
  </body>
</html>
